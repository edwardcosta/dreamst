<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>

    <style media="screen">
      body { background: url(assets/assets/images/404-bg.png); background-color: rgb(27,27,27);margin: auto; width: 100%;}
      div {display: flex; justify-content: center;}
      #foreground img {position: absolute; margin: auto; top: 0; left: 0; right: 0; bottom: 0;}
      #foreground img.center {display: block; margin-left: auto; margin-right: auto; width: 50%; margin-top: auto; margin-bottom: auto;}
      @media (max-width: 600px) {
        body { background: url(assets/assets/images/404-bg.png); background-color: rgb(27,27,27); }
        #foreground img { margin: 0; padding: 0; }
        #foreground img.responsive {width: 100%; height: auto;}
      }
    </style>
  </head>
  <body>
    <div id="foreground">
      <img src="assets/assets/images/404-fg.png" class="responsive center">
    </div>
  </body>
</html>
